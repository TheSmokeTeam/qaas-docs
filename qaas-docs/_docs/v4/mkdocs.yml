site_name: QaaS Docs
repo_name: qaas-docs
repo_url: https://github.com/TheSmokeTeam/qaas-docs
docs_dir: docs
exclude_docs: |
  bestPractices.md
  addOns/*
  advancedConcepts/*
  quickStart/*
  userInterfaces/*

nav:
  - Zero-to-Hero: index.md
  - Ecosystem Architecture: architecture.md
  - Runner Reference: reference.md
  - Troubleshooting: troubleshooting.md

theme:
  name: material
  features:
    - navigation.tabs
    - content.code.copy

plugins:
  - search
  - mike

extra:
  version:
    provider: mike

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - toc:
      permalink: true
