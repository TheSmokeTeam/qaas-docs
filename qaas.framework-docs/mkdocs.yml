site_name: QaaS Framework Docs
repo_name: QaaS.Framework
repo_url: https://github.com/TheSmokeTeam/QaaS.Framework
docs_dir: docs
exclude_docs: |
  projects/*

nav:
  - Guide: index.md
  - Reference: reference.md

theme:
  name: material
  features:
    - navigation.tabs
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - toc:
      permalink: true
