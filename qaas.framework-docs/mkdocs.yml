site_name: QaaS Framework Docs
docs_dir: docs/ 

nav:
  - Introduction: index.md
  - Projects:
    - SDK: projects/sdk.md
    - Configuration: projects/configuration.md
    - Executions: projects/executions.md
    - Infrastructure: projects/infrastructure.md
    - Policies: projects/policies.md
    - Protocols: projects/protocols.md
    - Providers: projects/providers.md
    - Serialization: projects/serialization.md
theme:
  name: readthedocs

markdown_extensions:
  - fenced_code
  - tables
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - admonition
  - def_list
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
plugins:
  - search
