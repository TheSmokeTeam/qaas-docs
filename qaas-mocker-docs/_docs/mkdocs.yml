site_name: QaaS Mocker Docs
repo_name: TheSmokeTeam/qaas-docs
repo_url: https://github.com/TheSmokeTeam/qaas-docs
docs_dir: docs/

nav:
  - Introduction: index.md
  - Quick Start:
      - Installation: quickStart/installation.md
      - Create Mock: quickStart/createMock.md
      - Deploy Mock: quickStart/deployMock.md
      - Integrate with Tests: quickStart/integrateWithTests.md
  - User Interfaces:
      - Mocker:
          - Configuration Sections:
              - Overview: userInterfaces/mocker/configurationSections/configurationSections.md
              - DataSources:
                  - Overview: userInterfaces/mocker/configurationSections/dataSources/overview.md
                  - Configurations:
                      - Table View: userInterfaces/mocker/configurationSections/dataSources/configurations/tableView.md
                      - YAML View: userInterfaces/mocker/configurationSections/dataSources/configurations/yamlView.md
              - Stubs:
                  - Overview: userInterfaces/mocker/configurationSections/stubs/overview.md
                  - Configurations:
                      - Table View: userInterfaces/mocker/configurationSections/stubs/configurations/tableView.md
                      - YAML View: userInterfaces/mocker/configurationSections/stubs/configurations/yamlView.md
              - Controller:
                  - Overview: userInterfaces/mocker/configurationSections/controller/overview.md
                  - Configurations:
                      - Table View: userInterfaces/mocker/configurationSections/controller/configurations/tableView.md
                      - YAML View: userInterfaces/mocker/configurationSections/controller/configurations/yamlView.md
              - Server:
                  - Overview: userInterfaces/mocker/configurationSections/server/overview.md
                  - Configurations:
                      - Table View: userInterfaces/mocker/configurationSections/server/configurations/tableView.md
                      - YAML View: userInterfaces/mocker/configurationSections/server/configurations/yamlView.md

theme:
  name: material
  custom_dir: ../../_shared/mkdocs/overrides
  font: false
  icon:
    logo: material/test-tube
    repo: fontawesome/brands/github
  features:
    - content.code.copy
    - content.tabs.link
    - header.autohide
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

plugins:
  - search

markdown_extensions:
  - attr_list
  - def_list
  - fenced_code
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra:
  current_product: Mocker
  product_links:
    - name: Suite
      path: ""
    - name: Runner
      path: runner/
    - name: Framework
      path: framework/
    - name: Common Assertions
      path: assertions/
    - name: Common Generators
      path: generators/
    - name: Common Probes
      path: probes/
    - name: Common Processors
      path: processors/
    - name: Mocker
      path: mocker/
  generator: false
