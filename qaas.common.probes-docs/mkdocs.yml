site_name: QaaS Common Probes Docs
repo_name: QaaS.Common.Probes
repo_url: https://github.com/TheSmokeTeam/QaaS.Common.Probes
docs_dir: docs

nav:
  - Guide: index.md
  - Reference: reference.md

theme:
  name: material
  features:
    - navigation.tabs
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - toc:
      permalink: true
