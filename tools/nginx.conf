worker_processes auto;
pid /tmp/qaas-docs/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;
    keepalive_timeout 65;

    client_body_temp_path /tmp/qaas-docs/nginx-client-body;
    proxy_temp_path /tmp/qaas-docs/nginx-proxy;
    fastcgi_temp_path /tmp/qaas-docs/nginx-fastcgi;
    uwsgi_temp_path /tmp/qaas-docs/nginx-uwsgi;
    scgi_temp_path /tmp/qaas-docs/nginx-scgi;

    server {
        listen 8000;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location = /assets/javascripts/qaas-docs-runtime-overrides.js {
            alias /tmp/qaas-docs/runtime-overrides.js;
            default_type application/javascript;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        location = /assets/javascripts/qaas-docs-runtime-overrides.min.js {
            alias /tmp/qaas-docs/runtime-overrides.js;
            default_type application/javascript;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
