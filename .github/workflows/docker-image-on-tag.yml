name: Build And Push Docker Image

on:
  push:
    tags:
      - '**'
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      DOCKER_REPOSITORY_NAME: ${{ vars.DOCKER_REPOSITORY_NAME || github.event.repository.name }}
      TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check Docker Hub secrets
        id: docker-secrets
        shell: bash
        run: |
          if [[ -n "${{ secrets.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME }}" && -n "${{ secrets.DOCKER_PASSWORD || secrets.DOCKERHUB_TOKEN }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub secrets are not configured. Skipping image push."
          fi

      - name: Set Docker tags
        if: steps.docker-secrets.outputs.enabled == 'true'
        id: docker-tags
        shell: bash
        run: |
          username="${{ secrets.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME }}"
          repository_name="${{ env.DOCKER_REPOSITORY_NAME }}"
          repository_override="${{ vars.DOCKERHUB_REPOSITORY }}"
          if [[ -n "${repository_override}" ]]; then
            image="${repository_override}"
          else
            image="${username}/${repository_name}"
          fi
          {
            echo "image=${image}"
            echo "value<<EOF"
            echo "${image}:${TAG_NAME}"
            echo "${image}:sha-${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.docker-secrets.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.docker-secrets.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD || secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: steps.docker-secrets.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.docker-tags.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
