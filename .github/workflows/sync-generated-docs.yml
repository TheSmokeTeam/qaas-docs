name: Sync Generated Docs

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - docs/mocker_documentation
    paths:
      - .github/workflows/sync-generated-docs.yml
      - scripts/Generate-ReferenceDocs.ps1
      - scripts/Refresh-CliSnapshots.ps1
      - tools/QaaS.Docs.Generator/**
      - mkdocs.yml

jobs:
  sync:
    runs-on: windows-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          path: qaas-docs

      - name: Checkout package mirror
        uses: actions/checkout@v4
        with:
          repository: TheSmokeTeam/QaaS.PackageMirror
          path: QaaS.PackageMirror

      - name: Checkout runner
        uses: actions/checkout@v4
        with:
          repository: TheSmokeTeam/QaaS.Runner
          path: QaaS.Runner

      - name: Checkout mocker
        uses: actions/checkout@v4
        with:
          repository: TheSmokeTeam/QaaS.Mocker
          path: QaaS.Mocker

      - name: Checkout framework
        uses: actions/checkout@v4
        with:
          repository: TheSmokeTeam/QaaS.Framework
          path: QaaS.Framework

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install docs dependencies
        working-directory: qaas-docs
        run: pip install -r requirements.txt

      - name: Run docs sync
        shell: pwsh
        run: |
          .\qaas-docs\scripts\Generate-ReferenceDocs.ps1 `
            -DocsRoot "$PWD\qaas-docs" `
            -MirrorRoot "$PWD\QaaS.PackageMirror" `
            -RunnerRoot "$PWD\QaaS.Runner" `
            -MockerRoot "$PWD\QaaS.Mocker" `
            -FrameworkRoot "$PWD\QaaS.Framework" `
            -Check `
            -BuildSite
