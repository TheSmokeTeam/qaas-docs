name: docs

on:
  push:
    branches: [feature/document-actions, main]
  pull_request:
    branches: [main]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MkDocs stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            mkdocs-material \
            mkdocs-llmstxt \
            mkdocs-htmlproofer-plugin \
            mkdocs-awesome-pages-plugin \
            mkdocs-redirects \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-glightbox \
            mkdocs-section-index \
            pymdown-extensions \
            json-schema-for-humans

      - name: Install validator tooling
        run: |
          npm install -g markdownlint-cli2
          curl -sSfL https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C /usr/local/bin lychee
          python -m pip install yamllint check-jsonschema

      - name: Frontmatter conformance check
        run: bash tools/ci/check-frontmatter.sh

      - name: markdownlint
        run: markdownlint-cli2 "docs/**/*.md" "#docs/_generated/**"

      - name: yamllint
        run: yamllint -c tools/ci/yamllint.yml mkdocs.yml mkdocs.yml.fragments/

      - name: mkdocs build --strict
        run: mkdocs build --strict --site-dir site

      - name: htmlproofer (intra-site anchors)
        run: |
          python -c "import mkdocs_htmlproofer_plugin" 2>/dev/null || true
          # htmlproofer-plugin runs as part of mkdocs build when configured;
          # this is the standalone backstop:
          curl -sSfL https://github.com/wjdp/htmltest/releases/latest/download/htmltest_0.17.0_linux_amd64.tar.gz | tar -xz -C /usr/local/bin htmltest
          htmltest -c tools/ci/htmltest.yml site/

      - name: lychee (external + relative links)
        run: lychee --config tools/ci/lychee.toml 'site/**/*.html'

      - name: Validate YAML snippets against schemas
        run: bash tools/ci/validate-yaml-snippets.sh

      - name: Compile C# snippets
        run: bash tools/ci/compile-csharp-snippets.sh

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: qaas-docs-site
          path: site/
          retention-days: 14

  build-zim:
    runs-on: ubuntu-latest
    needs: build-and-validate
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: qaas-docs-site
          path: site/

      - name: Build ZIM via openzim/zim-tools
        run: |
          docker run --rm -v "$PWD":/work -w /work ghcr.io/openzim/zim-tools:latest \
            zimwriterfs \
              --welcome=index.html \
              --favicon=site/assets/favicon.png \
              --language=eng \
              --title="QaaS Documentation" \
              --description="QA As A Service — unified documentation, agent-optimized" \
              --creator="TheSmokeTeam" \
              --publisher="TheSmokeTeam" \
              --name=qaas-docs \
              site/ qaas-docs.zim

      - name: Upload ZIM artifact
        uses: actions/upload-artifact@v4
        with:
          name: qaas-docs-zim
          path: qaas-docs.zim
          retention-days: 30

  pr-preview:
    runs-on: ubuntu-latest
    needs: build-and-validate
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: qaas-docs-site
          path: site/
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
