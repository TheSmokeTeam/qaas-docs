name: Deploy Documentation

on:
  push:
    branches:
      - master
      - fix/free_text
      - feature/better_docs
  pull_request:
    branches:
      - master
      - fix/free_text
      - feature/better_docs
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout package mirror
        uses: actions/checkout@v4
        with:
          repository: TheSmokeTeam/QaaS.PackageMirror
          path: QaaS.PackageMirror

      - name: Checkout runner
        uses: actions/checkout@v4
        with:
          repository: TheSmokeTeam/QaaS.Runner
          ref: feature/code-configuration-bootstrap
          path: QaaS.Runner

      - name: Checkout mocker
        uses: actions/checkout@v4
        with:
          repository: TheSmokeTeam/QaaS.Mocker
          ref: feature/docs-cli-export
          path: QaaS.Mocker

      - name: Checkout framework
        uses: actions/checkout@v4
        with:
          repository: TheSmokeTeam/QaaS.Framework
          ref: feature/elastic-defaults-hook
          path: QaaS.Framework

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate generated docs and build site
        shell: pwsh
        run: |
          .\scripts\Generate-ReferenceDocs.ps1 `
            -DocsRoot "$PWD" `
            -MirrorRoot (Join-Path $PWD 'QaaS.PackageMirror') `
            -RunnerRoot (Join-Path $PWD 'QaaS.Runner') `
            -MockerRoot (Join-Path $PWD 'QaaS.Mocker') `
            -FrameworkRoot (Join-Path $PWD 'QaaS.Framework') `
            -Check `
            -BuildSite

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/fix/free_text' || github.ref == 'refs/heads/feature/better_docs')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
